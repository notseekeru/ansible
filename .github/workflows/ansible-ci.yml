---
name: Ansible Lint, Syntax, Molecule

on:
  push:
    paths:
      - "**.yml"
      - "**.yaml"
      - "**/roles/**"
      - "inventories/**"
      - "ansible.cfg"
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
      - "**/roles/**"
      - "inventories/**"
      - "ansible.cfg"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create vault password file
        run: echo -n "${{ secrets.ANSIBLE_VAULT_PASS }}" > /home/runner/.vault_pass

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint molecule "molecule-plugins[docker]"

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.general ansible.posix community.crypto community.docker


      - name: Run ansible-lint
        run: ansible-lint

      - name: Run Ansible syntax checks
        run: |
          for f in playbooks/*.yml; do
            ansible-playbook -i inventories/hosts.ini "$f" --syntax-check
          done

  molecule:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - linux_neovim
          - docker-compose_personal
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core molecule "molecule-plugins[docker]"

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.general ansible.posix community.crypto community.docker

      - name: Run Molecule
        working-directory: roles/${{ matrix.role }}
        run: molecule test -s default
