name: Ansible Lint & Syntax Check

on:
  push:
    paths:
      - '**.yml'
      - '**.yaml'
      - '**/roles/**'
      - 'inventories/**'
      - 'ansible.cfg'
  pull_request:
    paths:
      - '**.yml'
      - '**.yaml'
      - '**/roles/**'
      - 'inventories/**'
      - 'ansible.cfg'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Create vault password file
        run: echo "${{ secrets.VAULT_PASS }}" > ~/.vault_pass

      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Ansible and ansible-lint
        run: |
          pip install ansible ansible-lint
      - name: Run ansible-lint
        run: |
          ansible-lint playbooks/*.yml roles/*/tasks/*.yml || true
          
      - name: Syntax check all playbooks
        run: |
          for f in playbooks/*.yml; do ansible-playbook -i inventories/hosts.ini "$f" --syntax-check; done
