name: Ansible Lint, Syntax, and Molecule Tests

on:
  push:
    paths:
      - "**.yml"
      - "**.yaml"
      - "**/roles/**"
      - "inventories/**"
      - "ansible.cfg"
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
      - "**/roles/**"
      - "inventories/**"
      - "ansible.cfg"

jobs:
  lint-and-syntax:
    name: Lint and Structural Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.general ansible.posix community.crypto community.docker

      - name: Run ansible-lint
        run: ansible-lint

      - name: Run Ansible syntax check
        run: |
          export ANSIBLE_VAULT_PASSWORD_FILE=.vault_pass
          echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > .vault_pass

          # Find all top-level or playbook yaml files safely without loop crashing
          find . -maxdepth 2 -name "*.yml" ! -path "*/molecule/*" -exec ansible-playbook {} --syntax-check \;

          rm -f .vault_pass

  molecule-tests:
    name: Molecule Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    strategy:
      matrix:
        role: [tailscale, linux_security, linux_neovim]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Molecule and Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core molecule "molecule-plugins[docker]" docker

      - name: Run Molecule Test Sequence
        run: |
          cd roles/${{ matrix.role }}
          molecule test -s default
        env:
          ANSIBLE_FORCE_COLOR: "1"
          PY_COLORS: "1"
