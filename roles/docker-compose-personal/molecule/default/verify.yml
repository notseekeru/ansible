---
- name: Verify docker-compose-personal role
  hosts: all
  tasks:
    - name: Verify repository directory exists
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/docker"
      register: repo_dir

    - name: Ensure repository directory is present
      ansible.builtin.assert:
        that:
          - repo_dir.stat.exists
          - repo_dir.stat.isdir
