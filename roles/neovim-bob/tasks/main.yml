---
# tasks file for ./roles/neovim-bob
# role dependencies added: neovim-base & zsh as dependencies in meta/main.yml

- name: "Remove apt neovim if present to avoid conflicts with bob"
  ansible.builtin.apt:
    name: neovim
    state: absent

- name: "Install bob-nvim"
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/MordechaiHadad/bob/master/scripts/install.sh | bash
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.local/bin/bob"
  become: false

- name: "Pin Neovim version 0.11.2"
  ansible.builtin.shell: |
    export PATH="$HOME/.local/bin:$PATH"
    bob install 0.11.2
    bob use 0.11.2
  args:
    # Use the proxy binary path for idempotency
    creates: "{{ ansible_facts['user_dir'] }}/.local/share/bob/nvim-bin/nvim"
  become: false

- name: "Ensure bob pathing is correct in .zshrc"
  ansible.builtin.blockinfile:
    path: "~/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: bob_nvim"
    block: |
      export PATH="$HOME/.local/share/bob/nvim-bin:$HOME/.local/bin:$PATH"
    create: true
  become: false

- name: "Pull lazygit dotfiles"
  ansible.builtin.git:
    repo: "https://github.com/notseekeru/nvim.git"
    dest: "~/.config/nvim"
    version: main
    update: true
    force: true
  become: false
