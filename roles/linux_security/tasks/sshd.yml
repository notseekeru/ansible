---
- name: Ensure SSH privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure all missing SSH host keys are generated
  ansible.builtin.command: ssh-keygen -A
  changed_when: false # Safe: ssh-keygen -A natively protects existing keys
  become: true

- name: Deploy hardened SSH configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: "{{ linux_security_sshd_config_path }}"
    owner: root
    group: root
    mode: "0600"
    validate: "{{ linux_security_sshd_validate_cmd }}"
  notify: Restart SSH
  become: true

- name: Remove cloud-init SSH overrides
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    state: absent
  notify: Restart SSH
  become: true
  when: linux_security_disable_cloud_init_ssh_override | bool
