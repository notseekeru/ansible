---
# roles/docker/defaults/main.yml

# Official Docker repo for Debian
docker_repo_url: "https://download.docker.com/linux/debian"

# Use modern dictionary-style facts to avoid deprecation warnings
docker_apt_repo_url: "{{ docker_repo_url }}"
docker_apt_gpg_key: "{{ docker_repo_url }}/gpg"
docker_apt_release_channel: stable
docker_repo_enabled: true

# On Pi 5 / Trixie, these are safe and recommended
docker_edition: "ce"
docker_packages:
  - "docker-{{ docker_edition }}"
  - "docker-{{ docker_edition }}-cli"
  - "docker-{{ docker_edition }}-rootless-extras"
  - "containerd.io"
  - docker-buildx-plugin
  - docker-compose-plugin

docker_obsolete_packages:
  - docker
  - docker.io
  - docker-engine
  - podman-docker
  - containerd
  - runc

# Ensure your user is defined
docker_users: ["piserver"]
