---
- name: Ensure apt key is not present in trusted.gpg.d
  ansible.builtin.file:
    path: /etc/apt/trusted.gpg.d/docker.asc
    state: absent

- name: Ensure old apt source list is not present in /etc/apt/sources.list.d
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/download_docker_com_linux_{{ ansible_facts['distribution'] | lower }}.list"
    state: absent

- name: Ensure old versions of Docker are not installed.
  ansible.builtin.package:
    name: "{{ docker_obsolete_packages }}"
    state: absent

- name: Ensure legacy repo file is not present.
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/docker.list"
    state: absent

- name: Ensure dependencies are installed.
  ansible.builtin.apt:
    name:
      - ca-certificates
      - python3-debian
    state: present

- name: Add or remove Docker repository.
  ansible.builtin.deb822_repository:
    name: "{{ docker_apt_filename | default('docker') }}"
    types: deb
    uris: "{{ docker_apt_repo_url }}"
    # Use ['distribution_release'] to be future-proof
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: "{{ docker_apt_release_channel | default('stable') }}"
    signed_by: "{{ docker_apt_gpg_key }}"
    state: "{{ (docker_repo_enabled | default(true) | bool) | ternary('present', 'absent') }}"
  notify: apt update

- name: Ensure Docker packages are installed.
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Ensure handlers are notified immediately to update the apt cache.
  ansible.builtin.meta: flush_handlers

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Ensure docker users are added to the docker group.
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Ensure Docker is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
