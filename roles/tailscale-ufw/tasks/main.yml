---
# tasks file for ./roles/ufw-tailscale

- name: Configure UFW to enforce Tailscale-only SSH
  block:
    - name: Allow SSH on port {{ ansible_port }} strictly over the Tailscale interface
      community.general.ufw:
        rule: allow
        port: "{{ ansible_port | default(22) }}"
        proto: tcp
        interface_in: tailscale0

    - name: Deny eth0 and wlan0 SSH access to harden against local network attacks
      community.general.ufw:
        rule: deny
        port: "{{ ansible_port | default(22) }}"
        proto: tcp
        interface_in: "{{ item }}"
      loop:
        - eth0
        - wlan0

    - name: Enable UFW with default deny
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Permanently mask avahi-daemon and socket
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
        state: stopped
      loop:
        - avahi-daemon.service
        - avahi-daemon.socket

    - name: Ensure UFW is enabled and running
      ansible.builtin.service:
        name: ufw
        state: started
        enabled: true
