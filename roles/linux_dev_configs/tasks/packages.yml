# SPDX-License-Identifier: MIT-0
---
- name: Install base packages for Neovim and shell tooling
  ansible.builtin.package:
    name: "{{ linux_dev_configs_packages }}"
    state: present
    update_cache: true
  become: true

- name: Remove distro Neovim to avoid conflicts with bob
  ansible.builtin.apt:
    name: neovim
    state: absent
  become: true
  when:
    - linux_dev_configs_remove_apt | bool
    - ansible_facts.os_family == 'Debian'
