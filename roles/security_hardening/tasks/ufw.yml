---
- name: Allow SSH on port {{ security_ufw_ssh_port }} over allowed interfaces
  community.general.ufw:
    rule: allow
    port: "{{ security_ufw_ssh_port }}"
    proto: tcp
    interface_in: "{{ item }}"
  loop: "{{ security_ufw_allow_interfaces }}"
  become: true

- name: Deny SSH on port {{ security_ufw_ssh_port }} over disallowed interfaces
  community.general.ufw:
    rule: deny
    port: "{{ security_ufw_ssh_port }}"
    proto: tcp
    interface_in: "{{ item }}"
  loop: "{{ security_ufw_deny_interfaces }}"
  become: true

- name: Enable UFW with default deny
  community.general.ufw:
    state: enabled
    policy: "{{ security_ufw_default_incoming_policy }}"
    direction: incoming
  become: true

- name: Permanently mask avahi services
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
    state: stopped
  loop:
    - avahi-daemon.service
    - avahi-daemon.socket
  when: security_disable_avahi | bool
  become: true

- name: Ensure UFW is enabled and running
  ansible.builtin.service:
    name: ufw
    state: started
    enabled: true
  become: true
