---
- name: Deploy hardened SSH configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: "{{ security_sshd_config_path }}"
    owner: root
    group: root
    mode: "0600"
    validate: "{{ security_sshd_validate_cmd }}"
  notify: Restart SSH
  become: true

- name: Remove cloud-init SSH overrides
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    state: absent
  notify: Restart SSH
  become: true
  when: security_disable_cloud_init_ssh_override | bool
