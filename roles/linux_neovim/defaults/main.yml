#SPDX-License-Identifier: MIT-0
---
neovim_packages:
	- curl
	- git
	- unzip
	- build-essential
	- fd-find
	- ripgrep
	- lazygit
	- fzf
	- tree-sitter-cli
	- zsh
	- tmux
neovim_remove_apt: true

neovim_install_bob: true
neovim_bob_install_url: "https://raw.githubusercontent.com/MordechaiHadad/bob/master/scripts/install.sh"
neovim_version: "0.11.2"
neovim_configure_path: true

neovim_install_dotfiles: true
neovim_dotfiles_repo: "https://github.com/notseekeru/nvim.git"
neovim_dotfiles_version: "main"
neovim_dotfiles_update: true
neovim_dotfiles_dest: "{{ dev_user_home }}/.config/nvim"

dev_user: "{{ ansible_user_id | default(ansible_user) }}"
dev_user_home: "{{ ansible_facts['user_dir'] }}"
dev_set_shell: true
dev_shell_path: /bin/zsh
dev_install_gh: true
dev_inputrc_ignore_case: true
dev_vimrc_enable: true
dev_vimrc_content: |
	set number
	set relativenumber
	syntax on
	nnoremap ; :
	nnoremap : ;
dev_shell_aliases:
	- "alias ll='ls -alF'"
	- "alias la='ls -A'"
	- "alias l='ls -CF'"
	- "alias compose='docker compose'"
dev_shell_functions: []
dev_shell_alias_files:
	- .bash_aliases
	- .zsh_aliases
dev_git_configure: true
dev_git_user_name: ""
dev_git_user_email: ""
