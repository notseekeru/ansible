- name: Check if Git Credential Manager is already installed
  ansible.builtin.command: which git-credential-manager
  register: gcm_check
  failed_when: false
  changed_when: false

- name: Map architecture to GCM asset naming scheme
  ansible.builtin.set_fact:
    linux_neovim_gcm_arch: >-
      {{
        'x64' if ansible_facts['architecture'] in ['x86_64', 'amd64'] else
        'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else
        ansible_facts['architecture']
      }}
  when: gcm_check.rc != 0

- name: Ensure .NET/GCM core dependencies are present (Docker fix)
  ansible.builtin.apt:
    name:
      - libicu-dev
      - git
    state: present
  become: true
  when: gcm_check.rc != 0

- name: Fetch latest Git Credential Manager release metadata from GitHub API
  ansible.builtin.uri:
    url: "https://api.github.com/repos/git-ecosystem/git-credential-manager/releases/latest"
    return_content: true
    status_code: 200
  register: gcm_api_response
  when: gcm_check.rc != 0

- name: Extract target .deb download URL from release assets (No Loop)
  ansible.builtin.set_fact:
    gcm_deb_download_url: >-
      {{
        gcm_api_response.json.assets
        | selectattr('name', 'search', 'gcm-linux-' + linux_neovim_gcm_arch + '.*\\.deb')
        | map(attribute='browser_download_url')
        | first | default('')
      }}
  when: gcm_check.rc != 0

- name: Download Git Credential Manager .deb package
  ansible.builtin.get_url:
    url: "{{ gcm_deb_download_url }}"
    dest: "/tmp/gcm-linux-latest.deb"
    mode: "0644"
  when:
    - gcm_check.rc != 0
    - gcm_deb_download_url | length > 0

- name: Install Git Credential Manager
  ansible.builtin.apt:
    deb: "/tmp/gcm-linux-latest.deb"
    state: present
  become: true
  when:
    - gcm_check.rc != 0
    - gcm_deb_download_url | length > 0

- name: Clean up GCM installer package
  ansible.builtin.file:
    path: "/tmp/gcm-linux-latest.deb"
    state: absent
  when:
    - gcm_check.rc != 0
    - gcm_deb_download_url | length > 0
