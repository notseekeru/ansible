---
- name: Change default shell to zsh
  ansible.builtin.user:
    name: "{{ linux_neovim_dev_user }}"
    shell: "{{ linux_neovim_dev_shell_path }}"
  become: true
  when: linux_neovim_dev_set_shell | bool

- name: Set inputrc to ignore case for tab completion
  ansible.builtin.template:
    src: inputrc.j2
    dest: "{{ linux_neovim_dev_user_home }}/.inputrc"
    mode: "0644"
    newline_sequence: "\n"
  become: false
  when: linux_neovim_dev_inputrc_ignore_case | bool

- name: Set Vim configuration
  ansible.builtin.template:
    src: vimrc.j2
    dest: "{{ linux_neovim_dev_user_home }}/.vimrc"
    mode: "0644"
    newline_sequence: "\n"
  become: false
  when: linux_neovim_dev_vimrc_enable | bool

- name: Install Oh My Zsh framework
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ linux_neovim_dev_user_home }}/.oh-my-zsh"
    depth: 1
    version: master
  become: false

- name: Install zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ linux_neovim_dev_user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    version: master
  become: false

- name: Install zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ linux_neovim_dev_user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    version: master
  become: false

- name: Deploy managed .zshrc
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ linux_neovim_dev_user_home }}/.zshrc"
    mode: "0644"
    newline_sequence: "\n"
  become: false

- name: Deploy managed .tmux.conf
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ linux_neovim_dev_user_home }}/.tmux.conf"
    mode: "0644"
    newline_sequence: "\n"
  become: false

- name: Deploy managed .gitconfig
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ linux_neovim_dev_user_home }}/.gitconfig"
    mode: "0644"
    newline_sequence: "\n"
  become: false
  when: linux_neovim_dev_git_configure | bool

- name: Deploy managed .git-credentials
  ansible.builtin.template:
    src: git-credentials.j2
    dest: "{{ linux_neovim_dev_user_home }}/.git-credentials"
    mode: "0600"
    newline_sequence: "\n"
  become: false
  when: linux_neovim_dev_git_configure | bool and github_token is defined and github_token | length > 0
