---
- name: Change default shell to zsh
  ansible.builtin.user:
    name: "{{ dev_user }}"
    shell: "{{ dev_shell_path }}"
  become: true
  when: dev_set_shell | bool

- name: Install GitHub CLI
  ansible.builtin.package:
    name: gh
    state: present
  become: true
  when: dev_install_gh | bool

- name: Set inputrc to ignore case for tab completion
  ansible.builtin.lineinfile:
    path: "{{ dev_user_home }}/.inputrc"
    regexp: "^set completion-ignore-case"
    line: "set completion-ignore-case on"
    state: present
    create: true
    mode: "0644"
  become: false
  when: dev_inputrc_ignore_case | bool

- name: Set Vim configuration
  ansible.builtin.copy:
    dest: "{{ dev_user_home }}/.vimrc"
    content: "{{ dev_vimrc_content }}"
    mode: "0644"
  become: false
  when: dev_vimrc_enable | bool

- name: Configure shell aliases
  ansible.builtin.copy:
    dest: "{{ dev_user_home }}/{{ item }}"
    content: |
      {{ dev_shell_aliases | join('\n') }}
      {% if dev_shell_functions | length > 0 %}

      {{ dev_shell_functions | join('\n') }}
      {% endif %}
    mode: "0644"
  loop: "{{ dev_shell_alias_files }}"
  become: false

- name: Ensure zsh sources aliases
  ansible.builtin.blockinfile:
    path: "{{ dev_user_home }}/.zshrc"
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK: zsh_aliases"
    block: |
      if [ -f ~/.zsh_aliases ]; then
          source ~/.zsh_aliases
      fi
    mode: "0644"
  become: false

- name: Configure git identity
  ansible.builtin.copy:
    dest: "{{ dev_user_home }}/.gitconfig"
    content: |
      [user]
        name = {{ dev_git_user_name }}
        email = {{ dev_git_user_email }}
    mode: "0644"
  become: false
  when:
    - dev_git_configure | bool
    - dev_git_user_name | length > 0
    - dev_git_user_email | length > 0
