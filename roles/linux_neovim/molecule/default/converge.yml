---
- name: Converge
  hosts: all
  become: true
  vars:
    linux_neovim_install_bob: false
    linux_neovim_install_dotfiles: false
    linux_neovim_dev_install_gh: false
    linux_neovim_packages:
      - curl
      - git
      - unzip
      - build-essential
      - zsh
  roles:
    - role: linux_neovim
