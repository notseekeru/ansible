---
- name: Ensure Cloudflare token is provided when managing .env
  ansible.builtin.assert:
    that:
      - docker_compose_personal_cloudflare_token | length > 0
    fail_msg: >-
      docker_compose_personal_cloudflare_token is missing. Set it in
      group_vars/vault.yml or inventory variables.
  when: docker_compose_personal_manage_env | bool

- name: Clone docker-compose repository
  ansible.builtin.git:
    repo: "{{ docker_compose_personal_repo }}"
    dest: "{{ docker_compose_personal_dest }}"
    version: "{{ docker_compose_personal_version }}"
    update: true
  become: false

- name: Create .env file for portfolio website
  ansible.builtin.copy:
    dest: "{{ docker_compose_personal_env_path }}"
    content: |
      CLOUDFLARE_TOKEN={{ docker_compose_personal_cloudflare_token }}
    mode: "0600"
  when: docker_compose_personal_manage_env | bool
  become: false

- name: Deploy portfolio website
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_personal_dest }}/{{ docker_compose_personal_project }}"
    state: present
    pull: "{{ docker_compose_personal_pull }}"
  when: docker_compose_personal_run_compose | bool
